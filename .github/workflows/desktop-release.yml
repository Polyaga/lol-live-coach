name: desktop-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version a publier (ex: 0.1.0)"
        required: true
        type: string
      channel:
        description: "Canal Velopack"
        required: false
        default: "stable"
        type: string
      release_notes_file:
        description: "Fichier markdown de release notes (optionnel)"
        required: false
        default: ""
        type: string
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve release inputs
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $channel = "${{ inputs.channel }}"
            $releaseNotesFile = "${{ inputs.release_notes_file }}"
          } else {
            $version = "${{ github.ref_name }}" -replace '^desktop-v', ''
            $channel = "stable"
            $releaseNotesFile = ""
          }

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "desktop-v$version"
          } else {
            $tag = "${{ github.ref_name }}"
          }

          $updateFeedUrl = "https://github.com/${{ github.repository }}"

          "version=$version" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_notes_file=$releaseNotesFile" >> $env:GITHUB_OUTPUT
          "update_feed_url=$updateFeedUrl" >> $env:GITHUB_OUTPUT

      - name: Publish desktop release
        shell: pwsh
        run: |
          ./scripts/publish-desktop.ps1 `
            -Version "${{ steps.vars.outputs.version }}" `
            -Channel "${{ steps.vars.outputs.channel }}" `
            -UpdateFeedUrl "${{ steps.vars.outputs.update_feed_url }}" `
            -PlatformBaseUrl "${{ vars.DESKTOP_PLATFORM_BASE_URL || 'https://lol-live-coach.vercel.app' }}" `
            -ReleaseNotesFile "${{ steps.vars.outputs.release_notes_file }}" `
            -SignTemplate "${{ secrets.VELOPACK_SIGN_TEMPLATE }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ steps.vars.outputs.version }}-${{ steps.vars.outputs.channel }}
          path: artifacts/desktop/release/win-x64/${{ steps.vars.outputs.channel }}

      - name: Publish GitHub release assets
        shell: pwsh
        run: |
          $env:DOTNET_ROLL_FORWARD = "Major"
          $arguments = @(
            "tool", "run", "vpk",
            "upload", "github",
            "--outputDir", "artifacts/desktop/release/win-x64/${{ steps.vars.outputs.channel }}",
            "--channel", "${{ steps.vars.outputs.channel }}",
            "--repoUrl", "https://github.com/${{ github.repository }}",
            "--token", "${{ secrets.GITHUB_TOKEN }}",
            "--publish",
            "--merge",
            "--releaseName", "LoL Live Coach ${{ steps.vars.outputs.version }}",
            "--tag", "${{ steps.vars.outputs.tag }}",
            "--targetCommitish", "${{ github.sha }}"
          )

          if ("${{ steps.vars.outputs.channel }}" -ne "stable") {
            $arguments += "--pre"
          }

          & dotnet @arguments
          if ($LASTEXITCODE -ne 0) {
            throw "La publication GitHub Release a echoue."
          }
