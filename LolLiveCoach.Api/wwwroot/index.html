<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoL Live Coach</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #181c23;
      --panel-2: #222833;
      --text: #f5f7fa;
      --muted: #aab4c3;
      --accent: #5aa9ff;
      --success: #60d394;
      --warning: #ffd166;
      --danger: #ff6b6b;
      --border: #2c3440;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI Variable Text", Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    body.compact {
      padding: 10px;
    }

    body.compact .container {
      max-width: 430px;
      margin: 0;
    }

    body.compact .topbar {
      margin-bottom: 12px;
      align-items: flex-start;
    }

    body.compact h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }

    body.compact .muted {
      font-size: 12px;
    }

    body.compact .grid {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    body.compact .card {
      padding: 14px;
      border-radius: 14px;
    }

    body.compact .card:nth-child(2) {
      display: none;
    }

    body.compact .main-advice {
      font-size: 18px;
      margin-bottom: 12px;
    }

    body.compact .stat-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    body.compact .stat {
      padding: 10px;
    }

    body.compact .stat-label {
      font-size: 11px;
    }

    body.compact .stat-value {
      font-size: 15px;
    }

    body.compact .alert-list {
      gap: 8px;
    }

    body.compact .alert {
      padding: 10px 12px;
      font-size: 13px;
    }

    body.compact #alerts .alert:nth-child(n+3) {
      display: none;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .toggle-btn {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .toggle-btn:hover {
      border-color: var(--accent);
    }

    .status {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .main-advice {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .muted {
      color: var(--muted);
    }

    .alert-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .alert {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--warning);
      padding: 12px 14px;
      border-radius: 12px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
    }

    .enemy-list {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .enemy-chip {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .stat-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>LoL Live Coach</h1>
        <div class="muted">Vue locale en temps reel</div>
      </div>

      <div style="display:flex; gap:12px; align-items:center;">
        <button class="toggle-btn" onclick="toggleCompactMode()">Mode compact</button>
        <div class="status" id="status">Chargement...</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div style="margin-bottom: 16px;">
          <div id="gameStatus" class="status">...</div>
        </div>

        <div class="stat-grid" style="margin-bottom: 16px;">
          <div class="stat">
            <div class="stat-label">Champion</div>
            <div class="stat-value" id="champion">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Role</div>
            <div class="stat-value" id="role">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Niveau</div>
            <div class="stat-value" id="level">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Gold</div>
            <div class="stat-value" id="gold">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">KDA</div>
            <div class="stat-value" id="kda">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">HP</div>
            <div class="stat-value" id="hp">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Phase</div>
            <div class="stat-value" id="phase">-</div>
          </div>
        </div>

        <h2>Conseil principal</h2>
        <div class="main-advice" id="mainAdvice">Chargement...</div>
        <div class="muted" id="secondaryAdvice">Lecture en cours...</div>

        <h3>Alertes</h3>
        <div class="alert-list" id="alerts"></div>
      </div>

      <div class="card">
        <h2>Profil ennemi</h2>
        <div class="stat-grid">
          <div class="stat">
            <div class="stat-label">AD threats</div>
            <div class="stat-value" id="adThreats">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">AP threats</div>
            <div class="stat-value" id="apThreats">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Sustain</div>
            <div class="stat-value" id="sustainCount">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">Frontline</div>
            <div class="stat-value" id="frontlineCount">-</div>
          </div>
        </div>

        <h3 style="margin-top: 20px;">Champions ennemis</h3>
        <div class="enemy-list" id="enemyList"></div>
      </div>
    </div>
  </div>

  <script>
    async function fetchJson(url) {
      const response = await fetch(url);

      if (!response.ok) {
        throw new Error(`HTTP ${response.status} sur ${url}`);
      }

      return response.json();
    }

    function toggleCompactMode() {
      document.body.classList.toggle("compact");

      const isCompact = document.body.classList.contains("compact");
      localStorage.setItem("lolCoachCompactMode", isCompact ? "1" : "0");

      const button = document.querySelector(".toggle-btn");
      button.textContent = isCompact ? "Mode normal" : "Mode compact";
    }

    function renderAlerts(alerts) {
      const container = document.getElementById("alerts");
      container.innerHTML = "";

      if (!alerts || alerts.length === 0) {
        container.innerHTML = `<div class="empty">Aucune alerte en ce moment.</div>`;
        return;
      }

      alerts.forEach(alert => {
        const div = document.createElement("div");
        div.className = "alert";

        if (alert.includes("armure")) {
          div.style.borderLeftColor = "#5aa9ff";
        } else if (alert.includes("resistance magique")) {
          div.style.borderLeftColor = "#b388ff";
        } else if (alert.includes("anti-heal")) {
          div.style.borderLeftColor = "#ffd166";
        } else if (alert.includes("kill")) {
          div.style.borderLeftColor = "#ff6b6b";
        }

        div.textContent = alert;
        container.appendChild(div);
      });
    }

    function renderEnemies(enemies) {
      const container = document.getElementById("enemyList");
      container.innerHTML = "";

      if (!enemies || enemies.length === 0) {
        container.innerHTML = `<div class="empty">Aucun ennemi detecte.</div>`;
        return;
      }

      enemies.forEach(enemy => {
        const chip = document.createElement("div");
        chip.className = "enemy-chip";
        chip.textContent = enemy.championName ?? enemy.summonerName ?? "Inconnu";
        container.appendChild(chip);
      });
    }

    function formatRole(role) {
      if (!role) return "-";

      switch (role) {
        case 1: return "Top";
        case 2: return "Jungle";
        case 3: return "Mid";
        case 4: return "ADC";
        case 5: return "Support";
        default: return "Inconnu";
      }
    }

    async function refresh() {
      const status = document.getElementById("status");

      try {
        const [advice, enemyProfile, game] = await Promise.all([
          fetchJson("/api/advice"),
          fetchJson("/api/enemy-profile"),
          fetchJson("/api/game")
        ]);

        document.getElementById("mainAdvice").textContent =
          advice.mainAdvice || "Aucun conseil disponible.";
        document.getElementById("secondaryAdvice").textContent =
          advice.secondaryAdvice || "Lecture minimale disponible.";

        renderAlerts(advice.alerts || []);
        renderEnemies(enemyProfile.enemies || []);

        document.getElementById("adThreats").textContent = enemyProfile.profile?.adThreatCount ?? "-";
        document.getElementById("apThreats").textContent = enemyProfile.profile?.apThreatCount ?? "-";
        document.getElementById("sustainCount").textContent = enemyProfile.profile?.sustainCount ?? "-";
        document.getElementById("frontlineCount").textContent = enemyProfile.profile?.frontlineCount ?? "-";

        const gameStatus = document.getElementById("gameStatus");

        if (!game.isInGame) {
          gameStatus.textContent = "Hors partie";
          gameStatus.style.color = "#ff6b6b";
        } else {
          gameStatus.textContent = "En partie";
          gameStatus.style.color = "#60d394";
        }

        const player = game.activePlayer;
        const localPlayer = game.localPlayer;

        document.getElementById("champion").textContent = localPlayer?.championName ?? "-";
        document.getElementById("role").textContent = formatRole(game.detectedRole);
        document.getElementById("level").textContent = player?.level ?? "-";
        document.getElementById("gold").textContent = player ? Math.round(player.currentGold) : "-";
        document.getElementById("kda").textContent = localPlayer
          ? `${localPlayer.kills}/${localPlayer.deaths}/${localPlayer.assists}`
          : "-";
        document.getElementById("hp").textContent =
          player ? `${Math.round(player.currentHealth)} / ${Math.round(player.maxHealth)}` : "-";
        document.getElementById("phase").textContent = advice.gamePhase ?? "-";

        const now = new Date().toLocaleTimeString();
        status.textContent = `Mis a jour a ${now}`;
      } catch (error) {
        console.error(error);

        document.getElementById("mainAdvice").textContent = "Erreur de chargement.";
        document.getElementById("secondaryAdvice").textContent = "Impossible de lire la partie en cours.";
        renderAlerts([]);
        renderEnemies([]);

        document.getElementById("adThreats").textContent = "-";
        document.getElementById("apThreats").textContent = "-";
        document.getElementById("sustainCount").textContent = "-";
        document.getElementById("frontlineCount").textContent = "-";

        document.getElementById("champion").textContent = "-";
        document.getElementById("role").textContent = "-";
        document.getElementById("level").textContent = "-";
        document.getElementById("gold").textContent = "-";
        document.getElementById("kda").textContent = "-";
        document.getElementById("hp").textContent = "-";
        document.getElementById("phase").textContent = "-";

        const gameStatus = document.getElementById("gameStatus");
        gameStatus.textContent = "Erreur";
        gameStatus.style.color = "#ff6b6b";

        status.textContent = "Erreur de connexion";
      }
    }

    const savedCompactMode = localStorage.getItem("lolCoachCompactMode");
    if (savedCompactMode === "1") {
      document.body.classList.add("compact");
    }

    window.addEventListener("DOMContentLoaded", () => {
      const button = document.querySelector(".toggle-btn");
      const isCompact = document.body.classList.contains("compact");
      button.textContent = isCompact ? "Mode normal" : "Mode compact";

      refresh();
      setInterval(refresh, 3000);
    });
  </script>
</body>
</html>
